<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ro'yxatdan o'tish — MediaPark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
        :root{--red:#E8001C;--red-dark:#c4001a;--border:#e0e0e0;--muted:#888;--green:#2ECC71}
        a{text-decoration:none;color:inherit}
        .container{max-width:1400px;margin:0 auto;padding:0 40px;width:100%}

        .auth-section{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}
        .auth-card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:460px;box-shadow:0 4px 24px rgba(0,0,0,.08)}

        .auth-logo{text-align:center;margin-bottom:8px}
        .auth-logo a{font-family:'Exo 2',sans-serif;font-size:28px;font-weight:900;text-decoration:none;letter-spacing:-.5px;line-height:1}
        .logo-accent{color:#1a1a1a}.logo-main{color:var(--red)}

        .auth-title{font-family:'Exo 2',sans-serif;font-size:26px;font-weight:800;text-align:center;margin-bottom:8px}
        .auth-subtitle{text-align:center;color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:28px}

        .form-group{margin-bottom:18px}
        .form-label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:#333}
        .form-input{width:100%;height:48px;border:1.5px solid var(--border);border-radius:10px;padding:0 16px;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;background:#fafafa}
        .form-input:focus{border-color:var(--red);background:#fff}
        .form-input::placeholder{color:#bbb}
        .form-error{color:var(--red);font-size:12px;margin-top:4px;display:none}
        .form-error.show{display:block}

        .submit-btn{width:100%;height:50px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
        .submit-btn:hover{background:var(--red-dark)}
        .submit-btn:disabled{opacity:.6;cursor:not-allowed}

        .alert-box{border-radius:10px;padding:12px 16px;font-size:13px;margin-top:16px;display:none;text-align:center}
        .alert-box.show{display:block}
        .alert-error{background:#ffe8e8;color:#c4001a}
        .alert-success{background:#e8ffe8;color:#1a7a1a}

        .divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--muted);font-size:12px}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

        .auth-switch{text-align:center;font-size:13px;color:var(--muted)}
        .auth-switch a{color:var(--red);font-weight:600}
        .auth-switch a:hover{text-decoration:underline}

        .back-link{text-align:center;margin-top:14px;font-size:13px;color:var(--muted)}
        .back-link:hover{color:#333}

        .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        @media(max-width:768px){.auth-card{padding:32px 24px}}
    </style>
</head>
<body>

<!-- NAVBAR -->
<div id="navbar-container"></div>

<!-- REGISTER START -->
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-logo">
            <a href="index.html">
                <span class="logo-accent">MEDIA</span><span class="logo-main">PARK</span>
            </a>
        </div>

        <h1 class="auth-title">Ro'yxatdan o'tish</h1>
        <p class="auth-subtitle">Avval emailingizni kiriting — unga tasdiqlash kodi yuboramiz</p>

        <div class="alert-box" id="alertBox"></div>

        <div class="form-group">
            <label class="form-label" for="regEmail">Email manzil</label>
            <input class="form-input" type="email" id="regEmail" placeholder="email@example.com" autocomplete="email"/>
            <div class="form-error" id="emailError"></div>
        </div>

        <button class="submit-btn" id="sendOtpBtn" onclick="sendOtp()">
            <span id="btnText">📩 Tasdiqlash kodini yuborish</span>
            <span id="btnSpinner" style="display:none"></span>
        </button>

        <div class="divider">yoki</div>

        <div class="auth-switch">
            Hisobingiz bormi? <a href="login.html">Kirish</a>
        </div>
        <div class="back-link">
            <a href="index.html">← Bosh sahifaga qaytish</a>
        </div>
    </div>
</section>

<!-- FOOTER -->
<div id="footer-container"></div>

<script>
    const API = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
        ? 'http://localhost:8000' : 'https://mediapark.zapto.org';

    // NAVBAR + FOOTER
    function loadHtml(id, path) {
        fetch(path)
            .then(r => r.ok ? r.text() : Promise.reject())
            .then(html => {
                const el = document.getElementById(id);
                if(!el) return;
                el.innerHTML = html;
                el.querySelectorAll('script').forEach(old => {
                    const s = document.createElement('script');
                    s.textContent = old.textContent;
                    old.replaceWith(s);
                });
            })
            .catch(() => {});
    }
    loadHtml('navbar-container', 'base/navbar.html');
    loadHtml('footer-container', 'base/footer.html');

    // Login qilingan bo'lsa
    if(localStorage.getItem('access_token')){
        location.href = 'index.html';
    }

    function showAlert(msg, type = 'error'){
        const box = document.getElementById('alertBox');
        box.textContent = (type === 'error' ? '❌ ' : '✅ ') + msg;
        box.className = 'alert-box show ' + (type === 'error' ? 'alert-error' : 'alert-success');
        setTimeout(() => box.classList.remove('show'), 5000);
    }

    function showFieldError(fieldId, msg){
        const el = document.getElementById(fieldId + 'Error');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4000);
    }

    function setLoading(isLoading){
        const btn = document.getElementById('sendOtpBtn');
        const text = document.getElementById('btnText');
        const spinner = document.getElementById('btnSpinner');
        if(isLoading){
            btn.disabled = true;
            text.style.display = 'none';
            spinner.style.display = 'inline-block';
            spinner.innerHTML = '<span class="spinner"></span>';
        } else {
            btn.disabled = false;
            text.style.display = 'inline';
            spinner.style.display = 'none';
        }
    }

    async function sendOtp(){
        const email = document.getElementById('regEmail').value.trim();

        if(!email){
            showFieldError('email', 'Email manzilni kiriting');
            return;
        }
        if(!email.includes('@') || !email.includes('.')){
            showFieldError('email', 'To\'g\'ri email manzil kiriting');
            return;
        }

        setLoading(true);

        try {
            // Email verify endpoint
            const res = await fetch(`${API}/api/v1/verify/email-verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            const data = await res.json();

            if(res.ok){
                // Email va vaqtinchalik verified statusini saqlash
                sessionStorage.setItem('otp_email', email);
                sessionStorage.setItem('otp_verified', '0');

                showAlert('Tasdiqlash kodi emailingizga yuborildi!', 'success');

                // OTP sahifasiga yo'naltirish
                setTimeout(() => {
                    window.location.href = 'otp.html';
                }, 1500);
            } else {
                const errorMsg = data.detail || data.email?.[0] || 'Xatolik yuz berdi';
                showAlert(errorMsg, 'error');
            }
        } catch(e) {
            console.error('Send OTP error:', e);
            showAlert('Server bilan bog\'lanib bo\'lmadi', 'error');
        } finally {
            setLoading(false);
        }
    }

    // Enter tugmasi
    document.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){
            sendOtp();
        }
    });
</script>
</body>
</html>
