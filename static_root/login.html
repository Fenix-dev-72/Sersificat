<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish — MediaPark</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">
            <a href="index.html">
                <span class="logo-accent">MEDIA</span><span class="logo-main">PARK</span>
            </a>
        </div>

        <h1>Xush kelibsiz!</h1>
        <p class="subtitle">Hisobingizga kiring</p>

        <div class="form-group">
            <label>Foydalanuvchi nomi</label>
            <input type="text" id="login-username" placeholder="username" autocomplete="username">
        </div>

        <div class="form-group">
            <label>Parol</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="submit-btn" id="login-btn" onclick="handleLogin()">Kirish</button>
        <div class="auth-error" id="login-error"></div>

        <div class="divider">yoki</div>

        <div class="auth-switch">
            Hisobingiz yo'qmi? <a href="register-start.html">Ro'yxatdan o'ting</a>
        </div>
        <div style="text-align:center;margin-top:14px">
            <a href="index.html" style="font-size:13px;color:var(--muted)">← Bosh sahifaga qaytish</a>
        </div>

    </div>
</div>

<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (isLoggedIn()) { window.location.href = 'index.html'; return; }
        document.getElementById('login-password')?.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('login-username')?.addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('login-password')?.focus();
        });
    });
</script>
</body>
</html>
