<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish — MediaPark</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">
            <a href="index.html">
                <span class="logo-accent">MEDIA</span><span class="logo-main">PARK</span>
            </a>
        </div>

        <h1>Hisob yaratish</h1>
        <p class="subtitle" id="reg-subtitle">Hisobingizni yakunlash uchun quyidagilarni to'ldiring.</p>

        <!-- Email verified badge (readonly) -->
        <div class="form-group">
            <label>Email <span style="color:#16a34a;font-size:12px;font-weight:700" id="email-ok-badge">✅ Tasdiqlangan</span></label>
            <input type="email" id="reg-email-display" readonly
                   style="background:#f0fdf4;border-color:#86efac;color:#166534;font-weight:600">
        </div>

        <div class="form-group">
            <label>Foydalanuvchi nomi</label>
            <input type="text" id="reg-username" placeholder="username (lotin, raqam, _ )" autocomplete="username">
        </div>

        <div class="form-group">
            <label>Parol</label>
            <input type="password" id="reg-password" placeholder="Kamida 9 belgi" oninput="checkPw()">
        </div>

        <div class="form-group">
            <label>Parolni tasdiqlang</label>
            <input type="password" id="reg-password2" placeholder="Parolni qayta kiriting" oninput="checkPw()">
            <div class="pw-confirm-note" id="pw-match-msg"></div>
        </div>

        <button class="submit-btn" id="register-btn" onclick="handleRegister()">
            Ro'yxatdan o'tish
        </button>
        <div class="auth-error" id="register-error"></div>
        <div class="auth-success" id="register-success"></div>

        <div class="divider">yoki</div>
        <div class="auth-switch">
            Hisobingiz bormi? <a href="login.html">Kirish</a>
        </div>

    </div>
</div>

<script src="app.js"></script>
<script>
    function checkPw() {
        const p1 = document.getElementById('reg-password')?.value;
        const p2 = document.getElementById('reg-password2')?.value;
        const msg = document.getElementById('pw-match-msg');
        if (!msg) return;
        if (!p2) { msg.textContent = ''; return; }
        if (p1 === p2) {
            msg.textContent = '✓ Parollar mos keldi';
            msg.className = 'pw-confirm-note pw-match';
        } else {
            msg.textContent = '✗ Parollar mos kelmadi';
            msg.className = 'pw-confirm-note pw-nomatch';
        }
    }

    window.handleRegister = async function() {
        const email= sessionStorage.getItem('otp_email') || '';
        const un   = document.getElementById('reg-username')?.value.trim();
        const pw   = document.getElementById('reg-password')?.value;
        const pw2  = document.getElementById('reg-password2')?.value;
        const err  = document.getElementById('register-error');
        const suc  = document.getElementById('register-success');

        if (err) err.textContent = '';
        if (suc) suc.textContent = '';

        if (sessionStorage.getItem('otp_verified') !== '1') {
            if (err) err.textContent = 'Email tasdiqlanmagan! OTP sahifasiga qayting.';
            return;
        }
        if (!email || !un || !pw) {
            if (err) err.textContent = 'Barcha maydonlarni to\'ldiring!';
            return;
        }
        if (pw.length < 9) {
            if (err) err.textContent = 'Parol kamida 9 ta belgi bo\'lishi kerak!';
            return;
        }
        if (pw !== pw2) {
            if (err) err.textContent = 'Parollar mos kelmadi!';
            return;
        }

        const btn = document.getElementById('register-btn');
        if (btn) { btn.disabled = true; btn.textContent = 'Yuborilmoqda...'; }

        try {
            const r = await fetch(API + '/register/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username:un, password:pw, role:'user' })
            });
            const d = await r.json();
            if (!r.ok) {
                const m = Object.values(d).flat().join(', ');
                if (err) err.textContent = m || 'Xato yuz berdi';
                return;
            }
            sessionStorage.removeItem('otp_verified');
            sessionStorage.removeItem('otp_email');
            if (suc) suc.textContent = '🎉 Muvaffaqiyatli ro\'yxatdan o\'tdingiz!';
            toast('Ro\'yxatdan o\'tildi! Endi kiring.', 'success');
            setTimeout(() => { window.location.href = 'login.html'; }, 1400);
        } catch {
            if (err) err.textContent = 'Server bilan bog\'lanib bo\'lmadi';
        } finally {
            if (btn) { btn.disabled = false; btn.textContent = 'Ro\'yxatdan o\'tish'; }
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        if (isLoggedIn()) { window.location.href = 'index.html'; return; }

        const email = sessionStorage.getItem('otp_email');
        const verified = sessionStorage.getItem('otp_verified') === '1';

        if (!email) {
            window.location.href = 'register-start.html';
            return;
        }

        const disp = document.getElementById('reg-email-display');
        if (disp) disp.value = email;

        if (!verified) {
            // Not verified yet — redirect back to OTP
            window.location.href = 'otp.html';
        }
    });
</script>
</body>
</html>
