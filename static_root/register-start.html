<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish — MediaPark</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">
            <a href="index.html">
                <span class="logo-accent">MEDIA</span><span class="logo-main">PARK</span>
            </a>
        </div>

        <h1>Ro'yxatdan o'ting</h1>
        <p class="subtitle">Avval emailingizni tasdiqlayiz — unga 6 xonali kod yuboramiz.</p>

        <div class="form-group">
            <label>Email manzil</label>
            <input type="email" id="reg-email" placeholder="email@example.com" autocomplete="email">
        </div>

        <button class="submit-btn" id="send-otp-btn" onclick="sendOtp()">
            📩 Tasdiqlash kodini yuborish
        </button>
        <div class="auth-error" id="register-error"></div>

        <div class="divider">yoki</div>

        <div class="auth-switch">
            Hisobingiz bormi? <a href="login.html">Kirish</a>
        </div>
        <div style="text-align:center;margin-top:14px">
            <a href="index.html" style="font-size:13px;color:var(--muted)">← Bosh sahifaga qaytish</a>
        </div>

    </div>
</div>

<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (isLoggedIn()) { window.location.href = 'index.html'; return; }
        document.getElementById('reg-email')?.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendOtp();
        });
    });
</script>
</body>
</html>
