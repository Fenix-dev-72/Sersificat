server {
    listen 80;
    server_name mediapark.zapto.org;

    # HTTP so'rovlarni HTTPS ga yo'naltirish
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mediapark.zapto.org;

    # SSL Sertifikatlari
    ssl_certificate /etc/letsencrypt/live/mediapark.zapto.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediapark.zapto.org/privkey.pem;

    # Xavfsizlik va optimallashtirish uchun sozlamalar
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 100M; # Rasmlar yuklash uchun limitni oshirdik

    # 1. Asosiy Frontend (templates ichidagi index.html uchun)
    location / {
        root /root/BarishaApi/templates;
        index index.html;
        # Agar so'rov fayl yoki papka bo'lmasa, index.html ni ko'rsatadi
        # Lekin Django ishlashi uchun buni ehtiyotkorlik bilan ishlatamiz
        try_files $uri $uri/ @proxy;
    }

    # 2. Django Statik fayllari
    location /static/ {
        alias /root/BarishaApi/static_root/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # 3. Media fayllar
    location /media/ {
        alias /root/BarishaApi/media/;
    }

    # 4. Google Console tasdiqlash fayli (templates ichida ekanligini aytdingiz)
    location = /google3c302ef042354121.html {
        root /root/BarishaApi/templates;
    }

    # 5. Django Backend (API, Admin va barcha dinamik so'rovlar)
    location @proxy {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # API va Admin uchun alohida e'lon qilish (aniqroq ishlashi uchun)
    location /api/ {
        try_files $uri @proxy;
    }

    location /admin/ {
        try_files $uri @proxy;
    }
}