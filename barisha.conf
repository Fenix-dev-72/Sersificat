server {
    listen 80;
    server_name mediapark.zapto.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mediapark.zapto.org;

    ssl_certificate /etc/letsencrypt/live/mediapark.zapto.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediapark.zapto.org/privkey.pem;

    # 1. Frontend (Statik sayt) uchun
    location / {
        root /root/BarishaApi/static_root;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Django Statik fayllari (CSS, JS, Images) uchun
    # find buyrug'i natijasiga ko'ra fayllaringiz static_root ichida turibdi
    location /static/ {
        alias /root/BarishaApi/static_root/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 3. Media fayllar (Mahsulot rasmlari)
    location /media/ {
        alias /root/BarishaApi/media/;
    }

    # 4. Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Admin Panel
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Google Console tasdiqlash fayli
    location = /google3c302ef042354121.html {
        root /root/BarishaApi/static_root;
    }
}