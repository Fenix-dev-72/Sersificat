# /etc/nginx/sites-available/mediapark
# BarishaApi uchun Nginx konfiguratsiyasi
# Tuzuvchi: siz; Maqsad: HTTPS bilan xizmat ko'rsatish, statik va media fayllarni berish, Django (gunicorn) ga proxy

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip optimallashtirish
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SSL umumiy sozlamalari
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/ssl/certs/dhparam.pem; # agar mavjud bo'lsa

    # Log fayllari
    access_log /var/log/nginx/mediapark.access.log;
    error_log /var/log/nginx/mediapark.error.log warn;

    # 1) HTTP -> HTTPS yo'naltirish
    server {
        listen 80;
        listen [::]:80;
        server_name mediapark.zapto.org;
        # Agar kerak bo'lsa ACME challenge uchun quyidagi location ni qo'shing:
        location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }
        return 301 https://$host$request_uri;
    }

    # 2) Asosiy HTTPS server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name mediapark.zapto.org;

        # SSL sertifikatlar (Let's Encrypt misoli)
        ssl_certificate /etc/letsencrypt/live/mediapark.zapto.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mediapark.zapto.org/privkey.pem;

        # Xavfsizlik sarlavhalari
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:;" always;

        # Maksimal yuk hajmi (rasmlar va fayllar uchun)
        client_max_body_size 100M;

        # Root va loyihaning joylashuvi (tavsiya: /var/www)
        # Eslatma: loyihani /root ichida saqlamang; /var/www/barishaapi ga ko'chiring
        root /var/www/barishaapi/templates;

        # Frontend (index.html) - agar SPA bo'lsa index.html ga fallback
        location / {
            index index.html;
            try_files $uri $uri/ /index.html @proxy;
        }

        # Statik fayllar
        location /static/ {
            alias /var/www/barishaapi/static_root/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        # Media fayllar
        location /media/ {
            alias /var/www/barishaapi/media/;
            access_log off;
            expires 30d;
        }

        # Google site verification fayli (agar templates ichida bo'lsa)
        location = /google3c302ef042354121.html {
            root /var/www/barishaapi/templates;
            access_log off;
        }

        # ACME challenge (Let's Encrypt) - agar certbot bilan avtomatik sozlash ishlamasa
        location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
            allow all;
        }

        # API va admin uchun alohida yo'nalishlar (statik fayl bo'lsa berish, aks holda proxy)
        location /api/ {
            try_files $uri @proxy;
        }

        location /admin/ {
            try_files $uri @proxy;
        }

        # Django backend uchun proxy (gunicorn 127.0.0.1:8000 ga bog'langan deb hisoblaymiz)
        location @proxy {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_redirect off;
            proxy_read_timeout 300;
            proxy_connect_timeout 60s;
            proxy_buffering off;
        }

        # Foydali xatolik sahifalari
        error_page 404 /404.html;
        location = /404.html {
            root /var/www/barishaapi/templates;
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/barishaapi/templates;
            internal;
        }
    }

    # Qo'shimcha server bloklari yoki virtual hostlar shu yerga qo'shilishi mumkin
}
